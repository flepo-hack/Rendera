workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        GEMINI_API_KEY: "dummy_key_here"
    scripts:
      - name: Check directory structure
        script: |
          pwd
          ls -la
          ls -la app/ || echo "app folder not found"
      - name: Build Android APK
        script: |
          # Käytetään Codemagicin omaa Gradlea
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
