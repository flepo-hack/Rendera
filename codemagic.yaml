workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        GEMINI_API_KEY: "dummy_key_here"
    scripts:
      - name: Unzip source code
        script: |
          echo "Extracting rendera.zip..."
          unzip -o rendera.zip -d .
          echo "Contents after unzip:"
          ls -la
      - name: Find and build project
        script: |
          # Etsitään kansio, jossa on settings.gradle.kts
          PROJECT_DIR=$(find . -name settings.gradle.kts -print -quit | xargs dirname)
          if [ -n "$PROJECT_DIR" ]; then
            echo "Project found in $PROJECT_DIR, building there"
            cd "$PROJECT_DIR"
            gradle assembleDebug
          else
            echo "ERROR: settings.gradle.kts not found!"
            exit 1
          fi
    artifacts:
      - app/build/outputs/apk/debug/*.apk
