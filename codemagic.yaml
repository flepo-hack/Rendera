workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        GEMINI_API_KEY: "dummy_key_here"
    scripts:
      - name: Unzip source code
        script: |
          echo "Extracting rendera.zip..."
          unzip -o rendera.zip -d .
          echo "Project structure after extraction:"
          ls -la
      - name: Install Gradle 9.3.1
        script: |
          echo "Installing Gradle 9.3.1..."
          GRADLE_VERSION=9.3.1
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip -d /usr/local/
          ls -la /usr/local/gradle-9.3.1/bin/
      - name: Build APK with correct Gradle (absolute path)
        script: |
          # Etsitään projekti
          PROJECT_DIR=$(find . -name settings.gradle.kts -print -quit | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle.kts not found!"
            exit 1
          fi
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          # Käytetään absoluuttista polkua, ei PATH-hassuttelua
          /usr/local/gradle-9.3.1/bin/gradle assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/*.apk
