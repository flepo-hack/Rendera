workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        GEMINI_API_KEY: "dummy_key_here"
    scripts:
      - name: Unzip source code
        script: |
          echo "=== STEP 1: Unzipping source code ==="
          unzip -o rendera.zip -d .
          echo "=== Project structure ==="
          ls -la
          echo "=== Looking for settings.gradle.kts ==="
          find . -name settings.gradle.kts -print
      - name: Setup Gradle Wrapper with correct version
        script: |
          echo "=== STEP 2: Setting up Gradle Wrapper ==="
          PROJECT_DIR=$(find . -name settings.gradle.kts -print -quit | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle.kts not found!"
            exit 1
          fi
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Luodaan wrapper-kansio, jos se puuttuu
          mkdir -p gradle/wrapper
          
          # Päivitetään distributionUrl arvoon 9.3.1
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          echo "=== Updated gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          
          # Luodaan gradlew-skripti, jos se puuttuu
          if [ ! -f gradlew ]; then
            echo "gradlew not found, downloading wrapper..."
            # Ladataan Gradle wrapper -skripti
            curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradlew
            curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
          fi
          
          # Varmistetaan, että gradlew on ajettava
          chmod +x gradlew
          echo "=== gradlew exists and is executable ==="
          ls -la gradlew
      - name: Build APK with Gradle Wrapper
        script: |
          echo "=== STEP 3: Building APK ==="
          PROJECT_DIR=$(find . -name settings.gradle.kts -print -quit | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle.kts not found!"
            exit 1
          fi
          cd "$PROJECT_DIR"
          
          # Tarkistetaan wrapperin versio
          echo "=== Checking wrapper version ==="
          ./gradlew --version || echo "Wrapper check failed, but continuing..."
          
          # Rakennetaan APK
          echo "=== Running assembleDebug ==="
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/*.apk
